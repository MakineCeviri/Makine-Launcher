name: Hata Raporu
description: Bir hata bildirin
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Açıklama
      description: Hatanın ne olduğunu açıklayın.
      placeholder: Hatanın detaylı açıklaması...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Yeniden Üretme Adımları
      description: Hatayı yeniden üretmek için adımları yazın.
      placeholder: |
        1. '...' sayfasına gidin
        2. '...' butonuna tıklayın
        3. Hatayı görün
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Beklenen Davranış
      description: Ne olması gerektiğini açıklayın.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Gerçekleşen Davranış
      description: Gerçekte ne olduğunu açıklayın.
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows Sürümü
      description: "Örnek: Windows 11 23H2"
      placeholder: Windows 11 23H2
    validations:
      required: true

  - type: input
    id: launcher-version
    attributes:
      label: Launcher Sürümü
      description: "Örnek: v0.1.0-alpha"
      placeholder: v0.1.0-alpha
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Ekran Görüntüleri
      description: Varsa ekran görüntüleri ekleyin.
    validations:
      required: false
