name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          modules: 'qtshadertools'

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure (UI-only)
        run: cmake -B build/ci -G Ninja -DCMAKE_BUILD_TYPE=Release -DMAKINE_UI_ONLY=ON -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build/ci
