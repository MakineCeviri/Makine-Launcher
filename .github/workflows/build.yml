name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.1'
          modules: 'qtshadertools'

      - name: Configure (UI-only)
        run: cmake --preset dev-ui

      - name: Build
        run: cmake --build --preset dev-ui
