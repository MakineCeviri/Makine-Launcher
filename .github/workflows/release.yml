name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0-beta)'
        required: true

permissions:
  contents: write

jobs:
  build-static:
    name: Static Build (Windows x64)
    runs-on: [self-hosted, Windows, X64, static-build]

    steps:
      - name: Prepare git
        run: git config --global --add safe.directory C:\actions-runner\_work\Makine-Launcher\Makine-Launcher

      - uses: actions/checkout@v4
        with:
          clean: false
          set-safe-directory: false

      - name: Inject encryption header (preserve existing key)
        run: |
          $src = "C:\Workspace\Makine\Makine-Launcher-Dev\qml\src\services\encryption_key.h"
          $dst = "qml\src\services\encryption_key.h"
          if (!(Test-Path $src)) { throw "Reference encryption_key.h not found at $src" }
          New-Item -ItemType Directory -Force -Path (Split-Path $dst) | Out-Null
          Copy-Item $src $dst -Force
          Write-Host "Encryption header injected from reference"

      - name: Configure static build
        run: cmake --preset release-static
        env:
          PATH: C:\Qt\Tools\CMake_64\bin;C:\Qt\Tools\mingw1310_64\bin;C:\Qt\Tools\Ninja;C:\Qt\6.10.1\mingw_64_static\bin;${{ env.PATH }}
          MAKINE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build
        run: cmake --build --preset release-static
        env:
          PATH: C:\Qt\Tools\CMake_64\bin;C:\Qt\Tools\mingw1310_64\bin;C:\Qt\Tools\Ninja;C:\Users\Administrator\AppData\Local\Microsoft\WinGet\Links;${{ env.PATH }}

      - name: Verify EXE
        run: |
          $exe = "build\release-static\Makine-Launcher.exe"
          if (!(Test-Path $exe)) { throw "EXE not found" }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "EXE size: $([math]::Round($size, 1)) MB"

      - name: Generate SHA256
        run: |
          $hash = (Get-FileHash "build\release-static\Makine-Launcher.exe" -Algorithm SHA256).Hash
          # ASCII keeps the file BOM-free across PowerShell 5/7 runners — hex hash is ASCII-safe
          $hash | Out-File -FilePath "build\release-static\SHA256SUMS.txt" -Encoding ascii
          Write-Host "SHA256: $hash"

      - name: Create ZIP
        run: |
          Compress-Archive -Path "build\release-static\Makine-Launcher.exe" -DestinationPath "Makine-Launcher-v${{ inputs.version }}-win64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Makine-Launcher-v${{ inputs.version }}-win64
          path: |
            Makine-Launcher-v${{ inputs.version }}-win64.zip
            build/release-static/SHA256SUMS.txt
          retention-days: 90

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $hash = Get-Content "build\release-static\SHA256SUMS.txt" -Raw
          # Strip a UTF-8 BOM if a previous run wrote one — keeps the release-notes hash clean
          $hash = $hash.TrimStart([char]0xFEFF)
          $body = @"
          ## Makine-Launcher v${{ inputs.version }}

          Turkish game translation launcher and adaptation engine.

          ### Download
          | File | Description |
          |------|-------------|
          | ``Makine-Launcher-v${{ inputs.version }}-win64.zip`` | Single static EXE (Windows x64) |

          ### Checksum
          ``````
          SHA256: $($hash.Trim())
          ``````

          ### Build Info
          - Qt 6.10.1 (static) + MinGW 13.1 + LTO
          - Built on: ${{ runner.name }}
          - Commit: ${{ github.sha }}
          "@

          # Check if release already exists
          $exists = gh release view "v${{ inputs.version }}" 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release exists, updating assets..."
            gh release delete-asset "v${{ inputs.version }}" "Makine-Launcher-v${{ inputs.version }}-win64.zip" --yes 2>&1 | Out-Null
            gh release upload "v${{ inputs.version }}" `
              "Makine-Launcher-v${{ inputs.version }}-win64.zip#Makine-Launcher v${{ inputs.version }} (Windows x64)" --clobber
            gh release edit "v${{ inputs.version }}" --notes $body
          } else {
            Write-Host "Creating new release..."
            gh release create "v${{ inputs.version }}" `
              "Makine-Launcher-v${{ inputs.version }}-win64.zip#Makine-Launcher v${{ inputs.version }} (Windows x64)" `
              --title "Makine-Launcher v${{ inputs.version }}" `
              --notes $body `
              --prerelease
          }
