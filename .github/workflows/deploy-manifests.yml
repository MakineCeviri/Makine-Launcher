name: Deploy Manifests to R2

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation mode'
        type: choice
        options:
          - validate-only
          - full-sync
        default: validate-only

jobs:
  deploy:
    name: R2 Manifest Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate live manifests
        run: |
          python3 -c "
          import json, urllib.request, sys

          CDN = 'https://cdn.makineceviri.org'
          R2  = 'https://pub-140c7bb439d7479b96e73779ff0a7c5f.r2.dev'

          def fetch(url):
              req = urllib.request.Request(url)
              req.add_header('User-Agent', 'Makine-Launcher-CI/1.0')
              return urllib.request.urlopen(req, timeout=15)

          # Try custom domain first, fallback to R2 direct
          for base in [CDN, R2]:
              try:
                  print(f'Fetching index.json from {base}...')
                  data = json.loads(fetch(f'{base}/assets/index.json').read())
                  print(f'  OK ({base})')
                  break
              except Exception as e:
                  print(f'  Failed: {e}')
                  if base == R2:
                      print('FATAL: Cannot reach index.json on either domain')
                      sys.exit(1)

          version = data['version']
          packages = data['packages']
          total = len(packages)

          # Domain check
          bad_domain = [k for k,v in packages.items()
                        if 'cdn.makineceviri.org' not in v.get('dataUrl','')]

          # Required fields check
          required = ['name', 'dataUrl', 'checksum', 'size', 'dirName']
          missing_fields = [k for k,v in packages.items()
                           if not all(v.get(f) for f in required)]

          # Spot check: verify 5 .mkpkg files are reachable
          import random
          sample_ids = random.sample(list(packages.keys()), min(5, total))
          missing_data = []
          for app_id in sample_ids:
              url = packages[app_id]['dataUrl']
              try:
                  req = urllib.request.Request(url)
                  req.add_header('User-Agent', 'Makine-Launcher-CI/1.0')
                  req.add_header('Range', 'bytes=0-0')
                  resp = urllib.request.urlopen(req, timeout=10)
              except Exception:
                  missing_data.append(app_id)

          # Report
          print()
          print('=== R2 Manifest Health Check ===')
          print(f'Version:        {version}')
          print(f'Packages:       {total}')
          print(f'Wrong domain:   {len(bad_domain)}')
          print(f'Missing fields: {len(missing_fields)}')
          print(f'Data spot check:{len(sample_ids) - len(missing_data)}/{len(sample_ids)} OK')
          if missing_data:
              print(f'  Missing: {missing_data}')

          if bad_domain:
              print(f'FAIL: Wrong domain in {bad_domain[:5]}')
              sys.exit(1)

          print()
          print('All checks passed')
          "

      - name: Full sync to R2
        if: ${{ inputs.mode == 'full-sync' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler

          CDN="https://cdn.makineceviri.org"
          R2="https://pub-140c7bb439d7479b96e73779ff0a7c5f.r2.dev"

          # Download current index (try custom domain, fallback to R2)
          curl -sf -A "Makine-Launcher-CI/1.0" "${CDN}/assets/index.json" -o /tmp/index.json || \
          curl -sf -A "Makine-Launcher-CI/1.0" "${R2}/assets/index.json" -o /tmp/index.json

          # Upload index
          wrangler r2 object put makineai-translations/assets/index.json \
            --file=/tmp/index.json --content-type="application/json" --remote
          echo "index.json uploaded"

          # Download and upload each package JSON
          count=0
          python3 -c "
          import json
          data = json.loads(open('/tmp/index.json').read())
          for app_id in data['packages']:
              print(app_id)
          " | while read app_id; do
            curl -sf -A "Makine-Launcher-CI/1.0" "${CDN}/assets/packages/${app_id}.json" \
              -o "/tmp/${app_id}.json" 2>/dev/null || \
            curl -sf -A "Makine-Launcher-CI/1.0" "${R2}/assets/packages/${app_id}.json" \
              -o "/tmp/${app_id}.json" 2>/dev/null || continue
            wrangler r2 object put "makineai-translations/assets/packages/${app_id}.json" \
              --file="/tmp/${app_id}.json" --content-type="application/json" --remote 2>/dev/null
            count=$((count+1))
          done
          echo "Package files synced: $count"
